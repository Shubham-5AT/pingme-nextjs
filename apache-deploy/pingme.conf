<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com

    # Proxy all traffic to Next.js Node.js server
    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket support (needed for Next.js HMR / real-time features)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*)           ws://localhost:3000/$1 [P,L]

    # Proxy all other requests
    ProxyPass        / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    # Forward real IP to Next.js
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Real-IP %{REMOTE_ADDR}s

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logs
    ErrorLog  ${APACHE_LOG_DIR}/pingme_error.log
    CustomLog ${APACHE_LOG_DIR}/pingme_access.log combined
</VirtualHost>
